<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公園現地調査トラッカー</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQvlnYRxhKkEYM66KjD3tIFf8qY4Ego="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <style>
    /* LeafletのCSSが読み込めない場合でも地図が崩れないようにする最低限の設定 */
    .leaflet-pane,
    .leaflet-tile,
    .leaflet-marker-icon,
    .leaflet-marker-shadow,
    .leaflet-tile-container,
    .leaflet-pane > svg,
    .leaflet-pane > canvas,
    .leaflet-zoom-box,
    .leaflet-image-layer,
    .leaflet-layer {
      position: absolute;
      left: 0;
      top: 0;
    }

    .leaflet-container {
      overflow: hidden;
      position: relative;
      outline-offset: 1px;
      background: #ddd;
    }

    .leaflet-tile,
    .leaflet-marker-icon,
    .leaflet-marker-shadow {
      user-select: none;
      -webkit-user-drag: none;
    }

    .leaflet-tile::selection { background: transparent; }

    .leaflet-control {
      position: relative;
      z-index: 800;
      pointer-events: auto;
    }

    .leaflet-top,
    .leaflet-bottom {
      position: absolute;
      z-index: 1000;
      pointer-events: none;
    }

    .leaflet-top { top: 0; }
    .leaflet-right { right: 0; }
    .leaflet-bottom { bottom: 0; }
    .leaflet-left { left: 0; }

    .leaflet-control-container .leaflet-top.leaflet-left { top: 10px; left: 10px; }

    .leaflet-popup-pane { z-index: 700; }
    .leaflet-marker-pane { z-index: 600; }
    .leaflet-tooltip-pane { z-index: 650; }
    .leaflet-overlay-pane { z-index: 400; }
    .leaflet-tile-pane { z-index: 200; }

    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --main: #2563eb;
      --main-dark: #1d4ed8;
      --done: #16a34a;
      --undone: #ef4444;
      --orange: #f59e0b;
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      padding: 26px 20px 18px;
      color: white;
      background: linear-gradient(135deg, #2563eb, #0f766e);
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    header p {
      margin: 0;
      font-size: 14px;
      opacity: 0.9;
    }

    main {
      max-width: 1280px;
      margin: 22px auto 50px;
      padding: 0 18px;
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }

    .card h2 {
      margin: 0;
      padding: 15px 18px;
      font-size: 18px;
      background: #f9fafb;
      border-bottom: 1px solid var(--line);
    }

    .card-body { padding: 18px; }

    .field { margin-bottom: 13px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      outline: 2px solid rgba(37, 99, 235, 0.25);
      border-color: var(--main);
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 15px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 9px 13px;
      color: white;
      background: var(--main);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: var(--main-dark); }
    button.secondary { background: #64748b; }
    button.secondary:hover { background: #475569; }
    button.danger { background: #dc2626; }
    button.danger:hover { background: #b91c1c; }
    button.green { background: var(--done); }
    button.green:hover { background: #15803d; }
    button.orange { background: var(--orange); }
    button.orange:hover { background: #d97706; }

    .hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      padding: 10px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid var(--line);
    }

    .stat span {
      display: block;
      font-size: 12px;
      color: var(--muted);
    }

    .stat strong {
      font-size: 22px;
      line-height: 1.2;
    }

    .map-card { min-height: 700px; }

    #map {
      height: 520px;
      width: 100%;
      min-height: 520px;
      border-bottom: 1px solid var(--line);
      position: relative;
      overflow: hidden;
      background: #e5e7eb;
    }

    .map-toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .map-toolbar-left,
    .map-toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .search-input {
      width: 240px;
      padding: 8px 10px;
    }

    .legend {
      display: flex;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
    }

    .dot {
      display: inline-block;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    .dot.done { background: var(--done); }
    .dot.undone { background: var(--undone); }

    .lists {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 16px;
    }

    .list-box {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .list-title {
      padding: 10px 12px;
      font-weight: 800;
      background: #f9fafb;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .list-title.done { color: var(--done); }
    .list-title.undone { color: var(--undone); }

    .park-list {
      max-height: 260px;
      overflow: auto;
    }

    .park-item {
      padding: 11px 12px;
      border-bottom: 1px solid #f1f5f9;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .park-item:last-child { border-bottom: 0; }

    .park-name {
      font-weight: 800;
      font-size: 14px;
    }

    .park-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .mini-btn {
      padding: 5px 8px;
      font-size: 12px;
      border-radius: 8px;
      margin-left: 4px;
    }

    .empty {
      padding: 22px 12px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }

    .csv-area {
      border-top: 1px solid var(--line);
      padding: 16px;
    }

    .csv-area textarea {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      height: 130px;
      font-size: 12px;
      white-space: pre;
    }

    .popup-title {
      font-weight: 800;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .popup-status {
      font-size: 13px;
      margin-bottom: 8px;
    }

    .leaflet-popup-content button {
      margin-top: 4px;
      padding: 6px 9px;
      font-size: 12px;
    }

    @media (max-width: 1000px) {
      main { grid-template-columns: 1fr; }
      .map-card { min-height: auto; }
    }

    @media (max-width: 720px) {
      .lists { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr; }
      #map { height: 380px; }
      .search-input { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>公園現地調査トラッカー</h1>
    <p>公園名と緯度経度を登録し、地図上で位置を確認しながら「調査未達」「調査済み」を管理するための補助ツールです。</p>
  </header>

  <main>
    <section class="card">
      <h2>1. 公園を登録</h2>
      <div class="card-body">
        <div class="stats">
          <div class="stat">
            <span>合計</span>
            <strong id="totalCount">0</strong>
          </div>
          <div class="stat">
            <span>調査済み</span>
            <strong id="doneCount">0</strong>
          </div>
          <div class="stat">
            <span>調査未達</span>
            <strong id="undoneCount">0</strong>
          </div>
        </div>

        <div class="field">
          <label for="parkName">公園名</label>
          <input id="parkName" type="text" placeholder="例：湘南台公園" />
        </div>

        <div class="two-col">
          <div class="field">
            <label for="lat">緯度</label>
            <input id="lat" type="number" step="0.0000001" placeholder="例：35.3961" />
          </div>
          <div class="field">
            <label for="lng">経度</label>
            <input id="lng" type="number" step="0.0000001" placeholder="例：139.4661" />
          </div>
        </div>

        <div class="field">
          <label for="status">調査状況</label>
          <select id="status">
            <option value="未達">調査未達</option>
            <option value="済み">調査済み</option>
          </select>
        </div>

        <div class="field">
          <label for="memo">メモ</label>
          <textarea id="memo" placeholder="例：入口の看板を確認予定、写真撮影済み、遊具側のルール看板未確認など"></textarea>
        </div>

        <div class="button-row">
          <button id="saveBtn" onclick="addOrUpdatePark()">公園を追加</button>
          <button class="secondary" onclick="clearForm()">入力欄をクリア</button>
          <button class="orange" onclick="fillSample()">サンプル入力</button>
        </div>

        <p class="hint">
          登録データはブラウザ内に自動保存されます。同じブラウザで再度開くと続きから作業できます。
        </p>
      </div>
    </section>

    <section class="card map-card">
      <h2>2. 地図・調査状況一覧</h2>

      <div class="map-toolbar">
        <div class="map-toolbar-left">
          <input id="searchInput" class="search-input" type="text" placeholder="公園名で検索" oninput="render()" />
          <select id="filterStatus" onchange="render()">
            <option value="all">すべて表示</option>
            <option value="未達">調査未達のみ</option>
            <option value="済み">調査済みのみ</option>
          </select>
        </div>
        <div class="map-toolbar-right">
          <div class="legend">
            <span><span class="dot undone"></span>調査未達</span>
            <span><span class="dot done"></span>調査済み</span>
          </div>
        </div>
      </div>

      <div id="map"></div>

      <div class="lists">
        <div class="list-box">
          <div class="list-title undone">
            <span>調査未達の公園</span>
            <span id="undoneListCount">0</span>
          </div>
          <div id="undoneList" class="park-list"></div>
        </div>

        <div class="list-box">
          <div class="list-title done">
            <span>調査済みの公園</span>
            <span id="doneListCount">0</span>
          </div>
          <div id="doneList" class="park-list"></div>
        </div>
      </div>

      <div class="csv-area">
        <div class="button-row" style="margin-top: 0; margin-bottom: 12px;">
          <button class="green" onclick="downloadCSV()">CSVをダウンロード</button>
          <button onclick="copyCSV()">CSVをコピー</button>
          <button class="secondary" onclick="fitAllMarkers()">全公園が見える位置へ</button>
          <button class="danger" onclick="deleteAll()">全削除</button>
        </div>
        <label for="csvPreview">CSVプレビュー</label>
        <textarea id="csvPreview" readonly></textarea>
        <p class="hint">出力列：park_name, lat, lng, status, memo, updated_at</p>
      </div>
    </section>
  </main>

  <script>
    let parks = JSON.parse(localStorage.getItem("parkFieldSurveyTracker") || "[]");
    let editingIndex = null;
    let markers = [];

    const DEFAULT_CENTER = [35.3392, 139.4900]; // 藤沢市周辺
    const map = L.map("map").setView(DEFAULT_CENTER, 13);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function addOrUpdatePark() {
      const name = document.getElementById("parkName").value.trim();
      const lat = Number(document.getElementById("lat").value);
      const lng = Number(document.getElementById("lng").value);
      const status = document.getElementById("status").value;
      const memo = document.getElementById("memo").value.trim();

      if (!name) {
        alert("公園名を入力してください。");
        return;
      }
      if (!Number.isFinite(lat) || lat < -90 || lat > 90) {
        alert("緯度を正しく入力してください。");
        return;
      }
      if (!Number.isFinite(lng) || lng < -180 || lng > 180) {
        alert("経度を正しく入力してください。");
        return;
      }

      const data = {
        park_name: name,
        lat,
        lng,
        status,
        memo,
        updated_at: new Date().toISOString().slice(0, 10)
      };

      if (editingIndex === null) {
        parks.push(data);
      } else {
        parks[editingIndex] = data;
        editingIndex = null;
        document.getElementById("saveBtn").textContent = "公園を追加";
      }

      saveLocal();
      clearForm();
      render();
      map.setView([lat, lng], 16);
    }

    function clearForm() {
      document.getElementById("parkName").value = "";
      document.getElementById("lat").value = "";
      document.getElementById("lng").value = "";
      document.getElementById("status").value = "未達";
      document.getElementById("memo").value = "";
      editingIndex = null;
      document.getElementById("saveBtn").textContent = "公園を追加";
    }

    function fillSample() {
      document.getElementById("parkName").value = "湘南台公園";
      document.getElementById("lat").value = "35.3961";
      document.getElementById("lng").value = "139.4661";
      document.getElementById("status").value = "未達";
      document.getElementById("memo").value = "現地で公園入口と遊具周辺のルール看板を確認する。";
    }

    function editPark(index) {
      const p = parks[index];
      editingIndex = index;
      document.getElementById("parkName").value = p.park_name;
      document.getElementById("lat").value = p.lat;
      document.getElementById("lng").value = p.lng;
      document.getElementById("status").value = p.status;
      document.getElementById("memo").value = p.memo || "";
      document.getElementById("saveBtn").textContent = "編集内容を保存";
      map.setView([p.lat, p.lng], 16);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deletePark(index) {
      if (!confirm("この公園を削除しますか？")) return;
      parks.splice(index, 1);
      saveLocal();
      render();
    }

    function toggleStatus(index) {
      parks[index].status = parks[index].status === "済み" ? "未達" : "済み";
      parks[index].updated_at = new Date().toISOString().slice(0, 10);
      saveLocal();
      render();
    }

    function focusPark(index) {
      const p = parks[index];
      map.setView([p.lat, p.lng], 17);
      const marker = markers.find(m => m.options.parkIndex === index);
      if (marker) marker.openPopup();
    }

    function deleteAll() {
      if (!parks.length) return;
      if (!confirm("登録済みの公園データをすべて削除しますか？")) return;
      parks = [];
      editingIndex = null;
      clearForm();
      saveLocal();
      render();
    }

    function getFilteredIndexes() {
      const q = document.getElementById("searchInput").value.trim().toLowerCase();
      const filter = document.getElementById("filterStatus").value;
      return parks
        .map((p, index) => ({ p, index }))
        .filter(({ p }) => {
          const matchName = !q || p.park_name.toLowerCase().includes(q);
          const matchStatus = filter === "all" || p.status === filter;
          return matchName && matchStatus;
        })
        .map(item => item.index);
    }

    function render() {
      const done = parks.filter(p => p.status === "済み");
      const undone = parks.filter(p => p.status === "未達");

      document.getElementById("totalCount").textContent = parks.length;
      document.getElementById("doneCount").textContent = done.length;
      document.getElementById("undoneCount").textContent = undone.length;
      document.getElementById("doneListCount").textContent = done.length;
      document.getElementById("undoneListCount").textContent = undone.length;
      document.getElementById("csvPreview").value = getCSV();

      renderMarkers();
      renderLists();
    }

    function renderMarkers() {
      markers.forEach(marker => map.removeLayer(marker));
      markers = [];

      const visibleIndexes = getFilteredIndexes();

      visibleIndexes.forEach(index => {
        const p = parks[index];
        const color = p.status === "済み" ? "#16a34a" : "#ef4444";
        const marker = L.circleMarker([p.lat, p.lng], {
          parkIndex: index,
          radius: 8,
          color: color,
          fillColor: color,
          fillOpacity: 0.85,
          weight: 2
        }).addTo(map);

        marker.bindPopup(`
          <div class="popup-title">${escapeHTML(p.park_name)}</div>
          <div class="popup-status">状況：<strong>${p.status === "済み" ? "調査済み" : "調査未達"}</strong></div>
          <div style="font-size:12px;color:#6b7280;">${escapeHTML(p.memo || "メモなし")}</div>
          <button onclick="toggleStatus(${index})">${p.status === "済み" ? "未達に戻す" : "調査済みにする"}</button>
          <button class="secondary" onclick="editPark(${index})">編集</button>
        `);

        markers.push(marker);
      });
    }

    function renderLists() {
      const undoneList = document.getElementById("undoneList");
      const doneList = document.getElementById("doneList");

      const visibleIndexes = getFilteredIndexes();
      const undone = visibleIndexes.filter(i => parks[i].status === "未達");
      const done = visibleIndexes.filter(i => parks[i].status === "済み");

      undoneList.innerHTML = undone.length ? undone.map(i => parkItemHTML(i)).join("") : '<div class="empty">該当する未達公園はありません。</div>';
      doneList.innerHTML = done.length ? done.map(i => parkItemHTML(i)).join("") : '<div class="empty">該当する調査済み公園はありません。</div>';
    }

    function parkItemHTML(index) {
      const p = parks[index];
      const nextLabel = p.status === "済み" ? "未達へ" : "済みにする";
      return `
        <div class="park-item">
          <div>
            <div class="park-name">${escapeHTML(p.park_name)}</div>
            <div class="park-meta">${p.lat}, ${p.lng} / 更新：${escapeHTML(p.updated_at || "")}</div>
            ${p.memo ? `<div class="park-meta">${escapeHTML(p.memo)}</div>` : ""}
          </div>
          <div>
            <button class="mini-btn" onclick="focusPark(${index})">地図</button>
            <button class="mini-btn green" onclick="toggleStatus(${index})">${nextLabel}</button>
            <button class="mini-btn secondary" onclick="editPark(${index})">編集</button>
            <button class="mini-btn danger" onclick="deletePark(${index})">削除</button>
          </div>
        </div>
      `;
    }

    function fitAllMarkers() {
      if (!parks.length) {
        map.setView(DEFAULT_CENTER, 13);
        return;
      }
      const latlngs = parks.map(p => [p.lat, p.lng]);
      map.fitBounds(latlngs, { padding: [40, 40] });
    }

    function getCSV() {
      const columns = ["park_name", "lat", "lng", "status", "memo", "updated_at"];
      const header = columns.join(",");
      const rows = parks.map(p => columns.map(col => csvEscape(p[col] ?? "")).join(","));
      return [header, ...rows].join("\n");
    }

    function downloadCSV() {
      if (!parks.length) {
        alert("出力するデータがありません。");
        return;
      }
      const bom = "\uFEFF";
      const blob = new Blob([bom + getCSV()], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `park_field_survey_${new Date().toISOString().slice(0, 10)}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    async function copyCSV() {
      if (!parks.length) {
        alert("コピーするデータがありません。");
        return;
      }
      await navigator.clipboard.writeText(getCSV());
      alert("CSVをコピーしました。");
    }

    function csvEscape(value) {
      const text = String(value);
      if (/[",\n\r]/.test(text)) {
        return `"${text.replace(/"/g, '""')}"`;
      }
      return text;
    }

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function saveLocal() {
      localStorage.setItem("parkFieldSurveyTracker", JSON.stringify(parks));
    }

    render();

    // file:// やCanvas表示では、初回表示時にLeafletが地図サイズを誤認識することがあります。
    // 少し時間を置いて再計算することで、タイルのずれ・重なりを防ぎます。
    setTimeout(() => map.invalidateSize(true), 200);
    setTimeout(() => map.invalidateSize(true), 700);
    window.addEventListener("load", () => map.invalidateSize(true));
    window.addEventListener("resize", () => map.invalidateSize(true));
  </script>
</body>
</html>
